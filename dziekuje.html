<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dziękuję!</title>
    <meta name="robots" content="noindex,nofollow" />

    <style>
      :root {
        --bg1: #0b1220;
        --bg2: #111827;
        --amber: #f59e0b;
        --orange: #f97316;
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.78);
        --card: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.14);
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(1200px 600px at 20% 10%, rgba(245, 158, 11, 0.18), transparent 55%),
          radial-gradient(1000px 600px at 80% 90%, rgba(249, 115, 22, 0.14), transparent 55%),
          linear-gradient(135deg, var(--bg1), var(--bg2));
        display: grid;
        place-items: center;
        padding: 28px;
      }

      .wrap {
        width: min(1100px, 100%);
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 24px;
        align-items: stretch;
      }

      @media (max-width: 900px) {
        .wrap {
          grid-template-columns: 1fr;
        }
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 28px;
        padding: 34px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(10px);
      }

      .badge {
        display: inline-block;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(245, 158, 11, 0.35);
        background: linear-gradient(90deg, rgba(245, 158, 11, 0.18), rgba(249, 115, 22, 0.14));
        color: #ffd38a;
        font-weight: 600;
        font-size: 13px;
        letter-spacing: 0.2px;
        margin-bottom: 14px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(46px, 5vw, 68px);
        line-height: 1.05;
        font-weight: 900;
      }

      p {
        margin: 0 0 18px;
        font-size: 18px;
        color: var(--muted);
        line-height: 1.55;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      .btn {
        display: inline-block;
        text-decoration: none;
        font-weight: 800;
        padding: 14px 18px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        color: white;
        transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      }

      .btn-primary {
        background: linear-gradient(90deg, var(--amber), var(--orange));
        box-shadow: 0 18px 45px rgba(245, 158, 11, 0.22);
        border: 0;
      }

      .btn:hover {
        transform: translateY(-1px);
        opacity: 0.96;
      }

      .photoWrap {
        position: relative;
        height: 100%;
        min-height: 320px;
        border-radius: 28px;
        overflow: hidden;
        border: 1px solid var(--border);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      }

      .photoWrap img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        transform: scale(1.02);
      }

      .photoWrap::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.62));
      }

      .hint {
        margin-top: 10px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.55);
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <main class="card">
        <div class="badge">Wiadomość wysłana</div>
        <h1>Dziękuję!</h1>
        <p>Skontaktujemy się wkrótce.</p>

        <div class="actions">
          <a class="btn btn-primary" href="/">Wróć na stronę główną</a>
          <a class="btn" href="/#kontakt">Kontakt</a>
        </div>

        <div class="hint">
          Jeśli nie wróciłeś automatycznie, kliknij przycisk powrotu lub przejdź do sekcji Kontakt.
        </div>
      </main>

      <aside>
        <div class="photoWrap">
          <!-- Podmień nazwę pliku na swoje zdjęcie z public/images/ -->
          <img src="images/1.png" alt="Dziękujemy - zdjęcie" />
        </div>
      </aside>
    </div>
  </body>
</html>
